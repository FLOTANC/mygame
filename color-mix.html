<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>いろをまぜよう</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0820;
            min-height: 100vh;
            font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

        /* ── Nav ── */
        .top-bar {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            gap: 0.6rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            color: #c4b5fd;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.4rem 1rem;
            cursor: pointer;
            text-decoration: none;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s;

        }
        .back-btn:hover { background: rgba(255,255,255,0.18); }

        .page-title {
            font-size: clamp(1rem, 3.5vw, 1.35rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            flex: 1;
        }

        .sound-btn {
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            color: #c4b5fd;
            font-size: 1.2rem;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .sound-btn:active { transform: scale(0.9); }
        .sound-btn.muted { opacity: 0.45; }

        /* ── Main ── */
        .main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 0 1rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        /* ── Instruction ── */
        .instruction {
            color: #f0e8ff;
            font-size: clamp(1.15rem, 4.5vw, 1.5rem);
            font-weight: 900;
            letter-spacing: 0.02em;
            text-align: center;
        }

        .step-hint {
            color: rgba(167,139,250,0.85);
            font-size: clamp(0.78rem, 3vw, 0.92rem);
            font-weight: 400;
            letter-spacing: 0.03em;
            text-align: center;
            min-height: 1.4em;
        }

        /* ── Color Buttons ── */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            width: 100%;
        }

        .color-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 4px solid transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            font-family: inherit;
            font-size: clamp(0.8rem, 3.2vw, 1rem);
            font-weight: 900;
            letter-spacing: 0.01em;
            color: white;
            text-shadow: 0 1px 6px rgba(0,0,0,0.6);
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                        border-color 0.15s,
                        box-shadow 0.15s;
            position: relative;
            overflow: visible;
            min-width: 60px;
            min-height: 60px;
        }

        .color-btn:active {
            transform: scale(0.9) !important;
        }

        .color-btn.selected-1 {
            border-color: #facc15;
            box-shadow: 0 0 0 4px rgba(250,204,21,0.4), 0 0 24px rgba(250,204,21,0.6);
            transform: scale(1.12);
        }

        .color-btn.selected-2 {
            border-color: #34d399;
            box-shadow: 0 0 0 4px rgba(52,211,153,0.4), 0 0 24px rgba(52,211,153,0.6);
            transform: scale(1.12);
        }

        .color-btn.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        /* ── Mixer display ── */
        .mixer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            min-height: 100px;
        }

        .mix-slot {
            width: clamp(60px, 18vw, 85px);
            height: clamp(60px, 18vw, 85px);
            border-radius: 50%;
            border: 3px dashed rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2rem);
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }

        .mix-slot.filled {
            border-style: solid;
            box-shadow: 0 0 20px color-mix(in srgb, var(--slot-color) 40%, transparent);
        }

        .mix-plus {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .mix-arrow {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        /* ── Result ── */
        .result-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            min-height: 140px;
        }

        .result-circle {
            width: clamp(110px, 35vw, 160px);
            height: clamp(110px, 35vw, 160px);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 3px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 7vw, 3rem);
            transition: background 0.5s, box-shadow 0.5s, border 0.4s;
            position: relative;
        }

        .result-circle.revealed {
            border-style: solid;
            border-color: rgba(255,255,255,0.4);
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes popIn {
            from { transform: scale(0.3); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .result-name {
            font-size: clamp(1.4rem, 5.5vw, 2rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: #f0e6ff;
            text-align: center;
            min-height: 2rem;
        }

        .result-name-en {
            font-size: clamp(0.7rem, 2.5vw, 0.88rem);
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(167,139,250,0.7);
            text-align: center;
            min-height: 1.2em;
        }

        /* ── Reset button ── */
        .reset-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 999px;
            color: white;
            font-family: inherit;
            font-size: clamp(0.9rem, 3.5vw, 1.05rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 0.7rem 2.4rem;
            cursor: pointer;
            min-height: 52px;
            min-width: 160px;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 20px rgba(168,85,247,0.4);
        }

        .reset-btn:hover { filter: brightness(1.15); }
        .reset-btn:active { transform: scale(0.95); }

        /* ── Confetti ── */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            animation: confettiFly var(--dur) ease-out forwards;
        }

        @keyframes confettiFly {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(0.5); }
            100% { opacity: 0; transform: translateY(var(--dy)) rotate(var(--rot)) scale(1.2); }
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<audio id="bgm" src="mix-music.mp3" loop preload="auto"></audio>

<div class="top-bar">
    <a class="back-btn" href="index.html">← もどる</a>
    <div class="page-title">いろをまぜよう</div>
    <button class="sound-btn" id="soundBtn" title="おんがく">
        <svg id="soundIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
    </button>
</div>

<div class="main">
    <div class="instruction">2つのいろをえらぼう！</div>
    <div class="step-hint" id="stepHint">1つめのいろをタップ</div>

    <!-- Color buttons -->
    <div class="color-grid" id="colorGrid">
        <button class="color-btn" style="background:#ef4444" data-id="赤"   data-hex="#ef4444">あか</button>
        <button class="color-btn" style="background:#eab308" data-id="黄"   data-hex="#eab308">きいろ</button>
        <button class="color-btn" style="background:#3b82f6" data-id="青"   data-hex="#3b82f6">あお</button>
        <button class="color-btn" style="background:rgba(220,220,230,0.7); border: 2px solid rgba(255,255,255,0.4);" data-id="白" data-hex="#f1f5f9">しろ</button>
        <button class="color-btn" style="background:#1e1b4b; border: 2px solid rgba(255,255,255,0.2);" data-id="黒" data-hex="#1e1b4b">くろ</button>
        <button class="color-btn" style="background:#16a34a" data-id="みどり" data-hex="#16a34a">みどり</button>
    </div>

    <!-- Mix display -->
    <div class="mixer">
        <div class="mix-slot" id="slot1"></div>
        <div class="mix-plus">＋</div>
        <div class="mix-slot" id="slot2"></div>
        <div class="mix-arrow">→</div>
    </div>

    <!-- Result -->
    <div class="result-area">
        <div class="result-circle" id="resultCircle"></div>
        <div class="result-name"   id="resultName"></div>
        <div class="result-name-en" id="resultNameEn"></div>
    </div>

    <button class="reset-btn" id="resetBtn" style="display:none">もういちど</button>
</div>

<script>
// ── Stars ──────────────────────────────────────────────────────────
(function(){
    const c = document.getElementById('stars');
    const ctx = c.getContext('2d');
    function resize(){ c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    const stars = Array.from({length:100}, ()=>({
        x:Math.random(), y:Math.random(),
        r:Math.random()*1.8+0.4,
        t:Math.random()*Math.PI*2,
        s:Math.random()*0.018+0.006
    }));
    (function tick(){
        ctx.fillStyle='#0d0820'; ctx.fillRect(0,0,c.width,c.height);
        stars.forEach(s=>{
            s.t+=s.s;
            ctx.save();
            ctx.globalAlpha=0.25+Math.sin(s.t)*0.55;
            ctx.fillStyle='#e9d5ff';
            ctx.shadowBlur=8; ctx.shadowColor='#a855f7';
            ctx.beginPath(); ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2); ctx.fill();
            ctx.restore();
        });
        requestAnimationFrame(tick);
    })();
})();

// ── Color mix data ─────────────────────────────────────────────────
// Key: "A+B" where A and B are sorted alphabetically
function mixKey(a, b) {
    return [a, b].sort().join('+');
}

const MIXES = {
    [mixKey('赤','黄')]:       { name:'オレンジ',   nameEn:'Orange',    hex:'#f97316', emoji:'🟠' },
    [mixKey('赤','青')]:       { name:'むらさき',   nameEn:'Purple',    hex:'#7c3aed', emoji:'🟣' },
    [mixKey('黄','青')]:       { name:'みどり',     nameEn:'Green',     hex:'#16a34a', emoji:'🟢' },
    [mixKey('赤','白')]:       { name:'ピンク',     nameEn:'Pink',      hex:'#f9a8d4', emoji:'🌸' },
    [mixKey('黄','白')]:       { name:'クリーム',   nameEn:'Cream',     hex:'#fef9c3', emoji:'🌼' },
    [mixKey('青','白')]:       { name:'みずいろ',   nameEn:'Sky Blue',  hex:'#7dd3fc', emoji:'💙' },
    [mixKey('赤','黒')]:       { name:'えんじ',     nameEn:'Crimson',   hex:'#7f1d1d', emoji:'🍷' },
    [mixKey('黄','黒')]:       { name:'オリーブ',   nameEn:'Olive',     hex:'#713f12', emoji:'🫒' },
    [mixKey('青','黒')]:       { name:'こんいろ',   nameEn:'Navy',      hex:'#1e3a5f', emoji:'🌊' },
    [mixKey('白','黒')]:       { name:'グレー',     nameEn:'Gray',      hex:'#6b7280', emoji:'🌫️' },
    [mixKey('みどり','黄')]:   { name:'きみどり',   nameEn:'Lime',      hex:'#84cc16', emoji:'🌿' },
    [mixKey('みどり','青')]:   { name:'ターコイズ', nameEn:'Turquoise', hex:'#0d9488', emoji:'🧊' },
    [mixKey('みどり','赤')]:   { name:'ちゃいろ',   nameEn:'Brown',     hex:'#78350f', emoji:'🤎' },
    [mixKey('みどり','白')]:   { name:'ミント',     nameEn:'Mint',      hex:'#6ee7b7', emoji:'🌿' },
    [mixKey('みどり','黒')]:   { name:'もりのいろ', nameEn:'Forest',    hex:'#14532d', emoji:'🌲' },
};

// same + same → deeper shade
const SAME = {
    '赤':     { name:'こいあか',   nameEn:'Deep Red',    hex:'#b91c1c', emoji:'❤️‍🔥' },
    '黄':     { name:'こいきいろ', nameEn:'Deep Yellow', hex:'#ca8a04', emoji:'✨' },
    '青':     { name:'こいあお',   nameEn:'Deep Blue',   hex:'#1d4ed8', emoji:'💙' },
    '白':     { name:'しろ',       nameEn:'White',       hex:'#e2e8f0', emoji:'☁️' },
    '黒':     { name:'くろ',       nameEn:'Black',       hex:'#09090b', emoji:'🌑' },
    'みどり': { name:'こいみどり', nameEn:'Dark Green',  hex:'#14532d', emoji:'🌲' },
};

// ── State ──────────────────────────────────────────────────────────
let pick1 = null;
let pick2 = null;
let phase = 'pick1'; // pick1 | pick2 | result

const buttons    = document.querySelectorAll('.color-btn');
const slot1      = document.getElementById('slot1');
const slot2      = document.getElementById('slot2');
const resultCircle = document.getElementById('resultCircle');
const resultName   = document.getElementById('resultName');
const resultNameEn = document.getElementById('resultNameEn');
const stepHint   = document.getElementById('stepHint');
const resetBtn   = document.getElementById('resetBtn');

function getColorData(id) {
    return [...buttons].find(b => b.dataset.id === id);
}

function updateSlot(slotEl, colorId) {
    const btn = getColorData(colorId);
    const hex = btn.dataset.hex;
    slotEl.style.background = hex;
    slotEl.style.setProperty('--slot-color', hex);
    slotEl.classList.add('filled');
    slotEl.textContent = '';
    slotEl.style.borderColor = hex;
    slotEl.style.boxShadow = `0 0 20px ${hex}80`;
}

function reveal(result) {
    resultCircle.style.background = result.hex;
    resultCircle.style.boxShadow  = `0 0 40px ${result.hex}80, 0 0 80px ${result.hex}40`;
    resultCircle.classList.add('revealed');
    resultCircle.textContent = '';
    resultName.textContent   = result.name;
    resultNameEn.textContent = result.nameEn;
    spawnConfetti(result.hex);
}

function onColorTap(e) {
    const btn = e.currentTarget;
    const id  = btn.dataset.id;

    if (phase === 'pick1') {
        pick1 = id;
        btn.classList.add('selected-1');
        updateSlot(slot1, id);
        stepHint.textContent = '2つめのいろをタップ';
        phase = 'pick2';
    } else if (phase === 'pick2') {
        pick2 = id;
        btn.classList.add('selected-2');
        updateSlot(slot2, id);
        stepHint.textContent = 'まぜてるよ〜！';
        phase = 'result';

        // lock buttons
        buttons.forEach(b => b.classList.add('disabled'));

        setTimeout(() => {
            let result;
            if (pick1 === pick2) {
                result = SAME[pick1];
            } else {
                result = MIXES[mixKey(pick1, pick2)];
            }
            if (result) {
                reveal(result);
                stepHint.textContent = 'できあがり！！';
            }
            resetBtn.style.display = 'inline-flex';
        }, 700);
    }
}

buttons.forEach(btn => {
    btn.addEventListener('click',      onColorTap);
    btn.addEventListener('touchstart', onColorTap, {passive: true});
});

resetBtn.addEventListener('click', reset);

function reset() {
    pick1 = null; pick2 = null; phase = 'pick1';
    buttons.forEach(b => {
        b.classList.remove('selected-1', 'selected-2', 'disabled');
    });
    slot1.style.background = ''; slot1.style.boxShadow = '';
    slot1.style.borderColor = ''; slot1.classList.remove('filled');
    slot1.textContent = '？';
    slot2.style.background = ''; slot2.style.boxShadow = '';
    slot2.style.borderColor = ''; slot2.classList.remove('filled');
    slot2.textContent = '？';
    resultCircle.style.background = 'rgba(255,255,255,0.08)';
    resultCircle.style.boxShadow  = '';
    resultCircle.classList.remove('revealed');
    resultCircle.textContent = '';
    resultName.textContent   = '';
    resultNameEn.textContent = '';
    stepHint.textContent     = '1つめのいろをタップ';
    resetBtn.style.display   = 'none';
}

// ── Confetti ───────────────────────────────────────────────────────
function spawnConfetti(accentHex) {
    const palette = ['#f97316','#a855f7','#3b82f6','#16a34a','#eab308','#ef4444','#7dd3fc','#f9a8d4','#c4b5fd'];
    if (accentHex) palette.unshift(accentHex, accentHex);
    for (let i = 0; i < 28; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'confetti';
            const x = Math.random() * innerWidth;
            const y = Math.random() * innerHeight * 0.65;
            const dy = -(Math.random() * 240 + 80) + 'px';
            const rot = (Math.random() * 720 - 360) + 'deg';
            const dur = (Math.random() * 0.7 + 0.65) + 's';
            const size = 6 + Math.random() * 10;
            const color = palette[Math.floor(Math.random() * palette.length)];
            const isCircle = Math.random() > 0.45;
            el.style.cssText = `left:${x}px;top:${y}px;--dy:${dy};--rot:${rot};--dur:${dur};width:${size}px;height:${size}px;background:${color};border-radius:${isCircle ? '50%' : '3px'};`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }, i * 50);
    }
}

// ── BGM ─────────────────────────────────────────────────────────────
(function(){
    const bgm = document.getElementById('bgm');
    const btn = document.getElementById('soundBtn');
    bgm.volume = 0.55;
    let started = false;
    let muted = false;

    function startBgm() {
        if (started) return;
        started = true;
        bgm.play().catch(() => {});
    }

    // 最初のタップ/クリックで再生開始（ブラウザの自動再生制限対応）
    document.addEventListener('pointerdown', startBgm, { once: true });
    document.addEventListener('touchstart',  startBgm, { once: true, passive: true });

    // ページを離れるとき停止・戻ったとき再開
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) { bgm.pause(); }
        else if (started && !muted) { bgm.play().catch(() => {}); }
    });

    // ミュートボタン
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        muted = !muted;
        bgm.muted = muted;
        btn.querySelector('#soundIcon').style.opacity = muted ? '0.3' : '1';
        btn.classList.toggle('muted', muted);
        if (!started && !muted) startBgm();
    });
})();
</script>
</body>
</html>
