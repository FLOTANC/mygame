<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>いろのきもち</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#000;
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
    overflow:hidden;
    touch-action:none;
    user-select:none;
  }

  #bg-canvas {
    position:fixed; inset:0; width:100%; height:100%;
    display:block;
  }

  /* ── Back button ── */
  #back-btn {
    position:fixed; top:14px; left:14px; z-index:100;
    background:rgba(255,255,255,.12); border:none;
    border-radius:50%; width:42px; height:42px;
    color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(8px);
    transition:background .2s;
  }
  #back-btn:hover { background:rgba(255,255,255,.25); }

  /* ── HUD ── */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:center; align-items:center;
    padding:18px 20px 0;
    z-index:90; pointer-events:none;
  }
  #step-dots {
    display:flex; gap:8px;
  }
  .step-dot {
    width:10px; height:10px; border-radius:50%;
    background:rgba(255,255,255,.2);
    transition:background .5s, transform .4s;
  }
  .step-dot.done   { transform:scale(1.2); }
  .step-dot.active { transform:scale(1.4); }

  /* ── Color orb ── */
  #orb-wrap {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-60%);
    pointer-events:none; z-index:50;
    transition:opacity .6s;
  }
  #orb-canvas {
    width:200px; height:200px; display:block;
    filter: drop-shadow(0 0 28px currentColor) drop-shadow(0 0 56px currentColor);
  }

  /* ── UI panel ── */
  #ui {
    position:fixed;
    bottom:0; left:0; right:0;
    z-index:80;
    display:flex; flex-direction:column;
    align-items:center;
    padding:0 24px 40px;
    pointer-events:none;
  }

  #color-name {
    font-size:52px; font-weight:900;
    letter-spacing:.04em;
    text-shadow:0 0 30px currentColor, 0 0 60px currentColor;
    margin-bottom:8px;
    transition:opacity .5s;
  }

  #prompt {
    font-size:17px; color:rgba(255,255,255,.75);
    text-align:center; line-height:1.5;
    margin-bottom:28px;
    min-height:50px;
  }

  #mic-btn {
    pointer-events:all;
    width:74px; height:74px; border-radius:50%;
    border:3px solid rgba(255,255,255,.4);
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(12px);
    color:#fff; font-size:30px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .3s;
    position:relative;
  }
  #mic-btn.listening {
    border-color:rgba(255,255,255,.9);
    background:rgba(255,255,255,.25);
    animation:pulse-ring 1s ease-in-out infinite;
  }
  #mic-btn:disabled { opacity:.35; cursor:default; animation:none; }

  @keyframes pulse-ring {
    0%,100% { box-shadow:0 0 0 0 rgba(255,255,255,.4); }
    50%      { box-shadow:0 0 0 18px rgba(255,255,255,0); }
  }

  #skip-btn {
    pointer-events:all;
    margin-top:14px;
    background:none; border:1px solid rgba(255,255,255,.25);
    border-radius:20px; padding:6px 20px;
    color:rgba(255,255,255,.55); font-size:13px; cursor:pointer;
    transition:all .2s;
  }
  #skip-btn:hover { border-color:rgba(255,255,255,.6); color:#fff; }

  /* ── Floating words ── */
  .word-float {
    position:fixed;
    white-space:nowrap;
    font-size:22px; font-weight:700;
    pointer-events:none; z-index:70;
    opacity:0;
    animation:word-rise 4s ease-out forwards;
    text-shadow:0 0 16px currentColor, 0 0 32px currentColor;
  }
  @keyframes word-rise {
    0%   { opacity:0;   transform:translateY(0)   scale(.8); }
    15%  { opacity:1;   transform:translateY(-20px) scale(1); }
    80%  { opacity:.85; transform:translateY(-120px) scale(1); }
    100% { opacity:0;   transform:translateY(-160px) scale(.9); }
  }

  /* ── Result screen ── */
  #result {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.88);
    backdrop-filter:blur(16px);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:28px 20px;
    opacity:0; pointer-events:none;
    transition:opacity .8s;
  }
  #result.show { opacity:1; pointer-events:all; }

  #result h2 {
    font-size:26px; font-weight:900;
    margin-bottom:28px; letter-spacing:.06em;
    color:#fff;
  }

  .result-row {
    display:flex; align-items:center; gap:14px;
    width:100%; max-width:380px;
    margin-bottom:14px;
    background:rgba(255,255,255,.07);
    border-radius:16px; padding:12px 16px;
  }
  .result-swatch {
    width:40px; height:40px; border-radius:50%;
    flex-shrink:0;
    box-shadow:0 0 14px 4px var(--sc);
  }
  .result-label {
    font-size:14px; color:rgba(255,255,255,.5);
    line-height:1.2;
  }
  .result-feeling {
    font-size:18px; font-weight:700; color:#fff;
    line-height:1.3;
  }

  #restart-btn {
    margin-top:28px;
    padding:14px 44px;
    border-radius:50px;
    border:none;
    background:rgba(255,255,255,.15);
    color:#fff; font-size:17px; font-weight:700; cursor:pointer;
    transition:background .2s;
  }
  #restart-btn:hover { background:rgba(255,255,255,.28); }

  /* ── Intro splash ── */
  #intro {
    position:fixed; inset:0; z-index:300;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#000;
    transition:opacity 1s;
  }
  #intro.hide { opacity:0; pointer-events:none; }

  #intro h1 {
    font-size:38px; font-weight:900; color:#fff;
    letter-spacing:.06em; margin-bottom:12px;
    text-align:center;
  }
  #intro p {
    font-size:15px; color:rgba(255,255,255,.55);
    text-align:center; line-height:1.7;
    max-width:280px; margin-bottom:44px;
  }
  #start-btn {
    padding:16px 52px; border-radius:50px; border:none;
    background:linear-gradient(135deg,#e53e3e,#e91e8c,#9c27b0);
    color:#fff; font-size:18px; font-weight:800; cursor:pointer;
    box-shadow:0 0 40px rgba(229,62,62,.5);
    transition:transform .15s, box-shadow .15s;
  }
  #start-btn:active { transform:scale(.95); }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<button id="back-btn" onclick="history.back()">←</button>

<div id="hud"><div id="step-dots"></div></div>

<div id="orb-wrap"><canvas id="orb-canvas"></canvas></div>

<div id="ui">
  <div id="color-name"></div>
  <div id="prompt"></div>
  <button id="mic-btn">🎤</button>
  <button id="skip-btn">とばす →</button>
</div>

<div id="result">
  <h2>🌈 きもちのきろく</h2>
  <div id="result-list"></div>
  <button id="restart-btn">もういちど</button>
</div>

<div id="intro">
  <h1>いろのきもち</h1>
  <p>６つの色が出てきます。<br>それぞれの色を見て、<br>きもちを声に出してみよう。</p>
  <button id="start-btn">はじめる</button>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
// COLORS
// ─────────────────────────────────────────────
const COLORS = [
  { id:'aka',     jp:'あか',     hex:0xe53e3e, css:'#e53e3e', label:'赤' },
  { id:'ao',      jp:'あお',     hex:0x2563eb, css:'#2563eb', label:'青' },
  { id:'midori',  jp:'みどり',   hex:0x22c55e, css:'#22c55e', label:'緑' },
  { id:'kiiro',   jp:'きいろ',   hex:0xfbbf24, css:'#fbbf24', label:'黄' },
  { id:'mura',    jp:'むらさき', hex:0xa855f7, css:'#a855f7', label:'紫' },
  { id:'daidai',  jp:'だいだい', hex:0xf97316, css:'#f97316', label:'橙' },
];

// ─────────────────────────────────────────────
// THREE.JS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const W = () => window.innerWidth, H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.1, 1000);
camera.position.set(0, 0, 28);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(W(), H()), 1.4, 0.6, 0.2);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
// PARTICLE SYSTEM  (webgl_points_dynamic style)
// ─────────────────────────────────────────────
const PARTICLE_COUNT = 12000;

const vertexShader = /* glsl */`
  uniform float time;
  uniform vec3  colorA;
  uniform vec3  colorB;
  attribute float seed;
  varying vec3 vColor;
  varying float vAlpha;

  void main() {
    float t = time * 0.4 + seed * 6.2831853;

    vec3 p = position;
    // wave displacement
    p.x += sin(t + seed * 3.7) * 1.8;
    p.y += cos(t * 1.1 + seed * 2.5) * 1.4;
    p.z += sin(t * 0.9 + seed * 1.9) * 1.2;

    vec4 mvPos = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mvPos;

    float dist = length(mvPos.xyz);
    gl_PointSize = clamp(220.0 / dist, 1.5, 5.0);

    float mix_t = fract(seed + time * 0.05);
    vColor = mix(colorA, colorB, smoothstep(0.0, 1.0, mix_t));
    vAlpha = 0.55 + 0.45 * sin(t * 1.3 + seed * 4.1);
  }
`;

const fragmentShader = /* glsl */`
  varying vec3 vColor;
  varying float vAlpha;

  void main() {
    float d = length(gl_PointCoord - 0.5) * 2.0;
    if (d > 1.0) discard;
    float a = (1.0 - d * d) * vAlpha;
    gl_FragColor = vec4(vColor, a);
  }
`;

const positions = new Float32Array(PARTICLE_COUNT * 3);
const seeds     = new Float32Array(PARTICLE_COUNT);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const r = 8 + Math.random() * 10;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  positions[i*3  ] = r * Math.sin(phi) * Math.cos(theta);
  positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i*3+2] = r * Math.cos(phi);
  seeds[i] = Math.random();
}

const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geom.setAttribute('seed',     new THREE.BufferAttribute(seeds, 1));

const ptMat = new THREE.ShaderMaterial({
  vertexShader, fragmentShader,
  uniforms: {
    time:   { value: 0 },
    colorA: { value: new THREE.Color(0xe53e3e) },
    colorB: { value: new THREE.Color(0xff9999) },
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const particles = new THREE.Points(geom, ptMat);
scene.add(particles);

// ─────────────────────────────────────────────
// COLOR ORB  (small Three.js canvas overlay)
// ─────────────────────────────────────────────
const orbCanvas  = document.getElementById('orb-canvas');
const orbRenderer = new THREE.WebGLRenderer({ canvas:orbCanvas, alpha:true, antialias:true, premultipliedAlpha:false });
orbRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
orbRenderer.setSize(200, 200);
orbRenderer.setClearColor(0x000000, 0);
orbRenderer.toneMapping = THREE.ReinhardToneMapping;
orbRenderer.toneMappingExposure = 1.8;

const orbScene  = new THREE.Scene();
const orbCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
orbCamera.position.set(0, 0, 5);

const orbMesh = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.1, 3),
  new THREE.MeshStandardMaterial({ color:0xe53e3e, emissive:0xe53e3e, emissiveIntensity:1.2, roughness:0.3, metalness:0.2, flatShading:true })
);
orbScene.add(orbMesh);

const orbLight = new THREE.PointLight(0xe53e3e, 5, 20);
orbLight.position.set(2, 2, 3);
orbScene.add(orbLight);
orbScene.add(new THREE.AmbientLight(0xffffff, 0.4));

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let step = 0;
const feelings = new Array(COLORS.length).fill('');
let speechActive = false;
let recognition  = null;
let currentColorObj = COLORS[0];

// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const colorNameEl = document.getElementById('color-name');
const promptEl    = document.getElementById('prompt');
const micBtn      = document.getElementById('mic-btn');
const skipBtn     = document.getElementById('skip-btn');
const stepDots    = document.getElementById('step-dots');
const resultDiv   = document.getElementById('result');
const resultList  = document.getElementById('result-list');
const introDiv    = document.getElementById('intro');

// Build step dots
COLORS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'step-dot';
  d.id = `dot-${i}`;
  stepDots.appendChild(d);
});

// ─────────────────────────────────────────────
// SHOW STEP
// ─────────────────────────────────────────────
function showStep(i) {
  step = i;
  if (i >= COLORS.length) { showResult(); return; }

  currentColorObj = COLORS[i];
  const c = currentColorObj;

  // Update particle colors
  const hsl = new THREE.Color(c.hex);
  const lighter = hsl.clone().offsetHSL(0, 0, 0.18);
  ptMat.uniforms.colorA.value.copy(hsl);
  ptMat.uniforms.colorB.value.copy(lighter);

  // Update orb
  orbMesh.material.color.set(c.hex);
  orbMesh.material.emissive.set(c.hex);
  orbLight.color.set(c.hex);
  orbCanvas.style.filter = `drop-shadow(0 0 24px ${c.css}) drop-shadow(0 0 50px ${c.css})`;
  bloom.strength = 1.6;

  // Update text
  colorNameEl.style.color = c.css;
  colorNameEl.style.textShadow = `0 0 30px ${c.css}, 0 0 60px ${c.css}`;
  colorNameEl.textContent = c.jp;
  promptEl.textContent = 'この色を見て、どんな気持ち？\nマイクを押してはなしてね 🎤';

  // Step dots
  document.querySelectorAll('.step-dot').forEach((d, j) => {
    d.classList.remove('done', 'active');
    d.style.background = '';
    if (j < i)      { d.classList.add('done');   d.style.background = COLORS[j].css; }
    else if (j === i){ d.classList.add('active'); d.style.background = c.css; }
  });

  micBtn.disabled = false;
  micBtn.classList.remove('listening');
  micBtn.textContent = '🎤';
}

// ─────────────────────────────────────────────
// SPEECH RECOGNITION
// ─────────────────────────────────────────────
const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening() {
  if (!SpeechRecog) {
    promptEl.textContent = '⚠️ このブラウザは音声認識に対応していません\nスキップして進めましょう';
    return;
  }
  if (speechActive) return;

  recognition = new SpeechRecog();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  speechActive = true;
  micBtn.classList.add('listening');
  micBtn.textContent = '⏹';
  promptEl.textContent = '聞いてるよ… 気持ちを話してね';

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    if (e.results[e.results.length-1].isFinal) {
      finishSpeech(transcript);
    } else {
      promptEl.textContent = `「${transcript}」…`;
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      promptEl.textContent = '声が聞こえなかった… もう一度押してね';
    }
    stopListening();
  };

  recognition.onend = () => {
    if (speechActive) stopListening();
  };

  recognition.start();
}

function stopListening() {
  speechActive = false;
  micBtn.classList.remove('listening');
  micBtn.textContent = '🎤';
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
}

function finishSpeech(text) {
  stopListening();
  if (!text.trim()) { promptEl.textContent = 'もう一度話してみてね'; return; }

  feelings[step] = text.trim();
  floatWords(text.trim(), currentColorObj.css);

  promptEl.textContent = `「${text.trim()}」\nすてきなきもちだね 💫`;
  micBtn.disabled = true;

  setTimeout(() => { showStep(step + 1); }, 2200);
}

// ─────────────────────────────────────────────
// FLOATING WORDS
// ─────────────────────────────────────────────
function floatWords(text, color) {
  const words = text.split(/[\s、。,]/g).filter(Boolean);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.55;

  words.forEach((word, i) => {
    const el = document.createElement('div');
    el.className = 'word-float';
    el.textContent = word;
    el.style.color = color;
    el.style.left  = (cx + (Math.random() - 0.5) * 180) + 'px';
    el.style.top   = (cy + (Math.random() - 0.5) * 60) + 'px';
    el.style.animationDelay = (i * 0.18) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500 + i * 200);
  });
}

// ─────────────────────────────────────────────
// MIC BUTTON
// ─────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (speechActive) { stopListening(); return; }
  startListening();
});

skipBtn.addEventListener('click', () => {
  stopListening();
  feelings[step] = '（スキップ）';
  showStep(step + 1);
});

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────
function showResult() {
  // hide game UI
  document.getElementById('ui').style.opacity = '0';
  document.getElementById('orb-wrap').style.opacity = '0';
  bloom.strength = 0.6;

  resultList.innerHTML = '';
  COLORS.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `
      <div class="result-swatch" style="background:${c.css};--sc:${c.css}"></div>
      <div>
        <div class="result-label">${c.jp}（${c.label}）</div>
        <div class="result-feeling">${feelings[i] || '—'}</div>
      </div>`;
    resultList.appendChild(row);
  });

  setTimeout(() => { resultDiv.classList.add('show'); }, 400);
}

document.getElementById('restart-btn').addEventListener('click', () => {
  resultDiv.classList.remove('show');
  feelings.fill('');
  document.getElementById('ui').style.opacity = '1';
  document.getElementById('orb-wrap').style.opacity = '1';
  showStep(0);
});

// ─────────────────────────────────────────────
// INTRO
// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  introDiv.classList.add('hide');
  setTimeout(() => { introDiv.style.display = 'none'; }, 1100);
  showStep(0);
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
  composer.setSize(W(), H());
  bloom.setSize(W(), H());
});

// ─────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Particles
  ptMat.uniforms.time.value = t;
  particles.rotation.y = t * 0.04;
  particles.rotation.x = Math.sin(t * 0.03) * 0.12;

  // Orb
  orbMesh.rotation.y = t * 0.5;
  orbMesh.rotation.x = t * 0.3;
  const scale = 1 + Math.sin(t * 1.8) * 0.04;
  orbMesh.scale.setScalar(scale);

  // Orb light pulse
  orbLight.intensity = 4.5 + Math.sin(t * 2.4) * 1.2;

  composer.render();
  orbRenderer.render(orbScene, orbCamera);
})();
</script>
</body>
</html>
